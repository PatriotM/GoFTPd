# Minimal slave-only config.
#
# Build the daemon, edit the values below, then start from this directory with:
#
#   ./goftpd --config etc/config-slave-example.yml
#
# If you prefer the default config path, copy this file to etc/config.yml and
# run ./goftpd without --config.

mode: "slave"
version: "dev"
timezone: "Europe/Amsterdam"
debug: false

# Optional but useful when running the slave detached.
log_file: "logs/goftpd-slave.log"
log_console: true
log_keep_days: 2

# TLS is shared top-level config. On a slave, tls_enabled controls encrypted
# client data sockets, so the cert/key must exist here when the master requires
# PROT P / encrypted transfers.
tls_enabled: true
tls_cert: "./etc/certs/server.crt"
tls_key: "./etc/certs/server.key"

# These two are master FTP policy flags. They are harmless in slave-only config
# and are kept here so the TLS block can stay aligned with the master config.
require_tls_control: true
require_tls_data: true
tls_exempt_users: []

# Refuse uploads when the selected slave root has less free space than this.
# Keep this aligned with the master config.
free_space_mb: 2048

slave:
  # Must match a master-side slaves[].name policy if you use policies.
  name: "LOCAL"

  # Master control socket.
  master_host: "127.0.0.1"
  master_port: 1099

  # Normal site root(s), exposed at virtual "/".
  roots:
    - "./site"

  # Optional: expose separate physical disks under one virtual archive path.
  # This is useful for NFS-mounted archive disks without putting mergerfs in
  # front of GoFTPd.
  mounted_roots: []
  # To use archive mounts, replace mounted_roots: [] above with:
  #
  # mounted_roots:
  #   - path: "/glftpd/DISK1"
  #     mount_path: "/ARCHiVE"
  #   - path: "/glftpd/DISK2"
  #     mount_path: "/ARCHiVE"

  # Passive ports used when clients connect directly to this slave.
  pasv_port_min: 30000
  pasv_port_max: 65000

  # Public IP advertised by this slave in PASV replies. Leave empty only when
  # auto-detect from the master connection is correct.
  bind_ip: ""

  timeout: 60
  ignore_partial_remerge: false

  # Keep this at 0 for fast local disks. For slow/NFS/archive disks, set 5-25
  # so SITE REMERGE yields between directories instead of pinning one disk.
  remerge_delay_ms: 0

  # Optional inner scan yield for huge directories. Example for low-impact
  # archive scans: remerge_entry_yield_every: 100 and remerge_entry_yield_ms: 10.
  remerge_entry_yield_every: 0
  remerge_entry_yield_ms: 0

  # Optional safety valve for busy/slower disks. If >0, remerge pauses while
  # this many uploads/downloads are active on the slave. Example: 1 pauses
  # remerge while any transfer is running.
  remerge_pause_on_active_transfers: 0

  transfer_buffer_size: 262144
