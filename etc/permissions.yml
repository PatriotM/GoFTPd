# GoFTPd ACL rules.
#
# required:
#   "*"       = everyone
#   "1"       = user flag 1
#   "=Admin"  = member of group Admin
#   "1 =SiteOP" = flag 1 and member of group SiteOP
#
# A trailing slash keeps wildcard matches to directory levels, glftpd-style:
#   /site/series/*/ matches /site/series/Release/
#   but not /site/series/Release/Sample/
rules:
  - type: privpath
    path: /site/LINKS
    required: "1 =SiteOP"
  - type: privpath
    path: /site/PRE/SiteOP
    required: "1 =SiteOP"
  - type: privpath
    path: /site/PRE/TEST-GRP
    required: "1 =SiteOP"
  - type: privpath
    path: /site/ARCHiVE/backup
    required: "1 =SiteOP"
  - type: privpath
    path: /site/ARCHiVE/COMPLETE
    required: "1 =SiteOP"

  - type: upload
    path: /site/*
    required: "*"

  - type: resume
    path: /site/*
    required: "*"
  - type: download
    path: /site/*
    required: "*"

  - type: makedir
    path: /site/REQUESTS/*
    required: "1"
  - type: makedir
    path: /site/*
    required: "1"

  - type: dirlog
    path: /site/PRE/*
    required: "1"
  - type: dirlog
    path: /site/*
    required: "*"

  - type: rename
    path: /site/*
    required: "1"
  - type: renameown
    path: /site/*
    required: "1"

  - type: nuke
    path: /site/*
    required: "1 A =NUKERS"
  - type: unnuke
    path: /site/*
    required: "1 B =NUKERS"

  - type: delete
    path: /site/PRE/*/*
    required: "1"
  - type: delete
    path: /site/*
    required: "1"
  - type: deleteown
    path: /site/*
    required: "1"

  - type: filemove
    path: /site/*
    required: "=Admin"

  - type: nodupecheck
    path: /site/PRE/*
    required: "1"
  - type: nodupecheck
    path: /site/REQUESTS/*
    required: "1"
  - type: nodupecheck
    path: /site/SPEEDTEST/*
    required: "1"
