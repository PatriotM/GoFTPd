# GoFTPd ACL rules.
#
# How matching works:
#   - Rules are checked top to bottom inside the requested type.
#   - The first matching rule decides access.
#   - If no action rule matches, matching privpath rules are checked.
#   - If nothing matches, flag 1 users are allowed by default.
#
# path:
#   - Paths are virtual paths under acl_base_path, normally /site.
#   - "*" is a wildcard. /site/* matches everything below /site.
#   - A trailing slash limits wildcard matches to one directory level,
#     glftpd-style:
#       /site/series/*/ matches /site/series/Release/
#       but not /site/series/Release/Sample/
#
# required:
#   "*"           anyone
#   "1"           user must have flag 1
#   "A"           user must have flag A
#   "=Admin"      user must be a member of group Admin
#   "@Nick"       user must be FTP user Nick
#   "=GRP =SiteOP" user must be in group GRP OR group SiteOP
#   "!4"          user must NOT have flag 4
#   "!=Group"     user must NOT be in group Group
#   "!@Nick"      user must NOT be FTP user Nick
#   "!*"          nobody; explicit deny
#   "1 =SiteOP"   user must have flag 1 AND be in group SiteOP
#   "1 A =NUKERS" user must have flags 1 and A AND be in group NUKERS
#   "1 =GRP =SiteOP" user must have flag 1 AND be in GRP OR SiteOP
#
# rule types used here:
#   privpath      hides/blocks paths unless the user matches required
#   upload        STOR permission
#   resume        resume permission placeholder for clients/configs
#   download      RETR permission
#   makedir       MKD and RMD permission
#   dirlog        visibility for SITE SEARCH / dirlog-like listings
#   rename        rename permission
#   renameown     owner-only rename policy
#   nuke          SITE NUKE permission
#   unnuke        SITE UNNUKE permission
#   delete        DELE permission
#   deleteown     owner-only delete policy
#   filemove      cross-directory/manual move permission placeholder
#   nodupecheck   marks paths intended to skip dupe-db checks; overwrite
#                 protection still rejects uploads to an existing filename
#   sitecmd       controls who may run SITE subcommands by command name
#
rules:
  # ---------------------------------------------------------------------------
  # SITE commands: command-level ACLs, glftpd-style.
  # This starter layout keeps SITE HELP aligned with what users can really run:
  #   - normal users get basic info/search/request commands
  #   - affils/staff can get PRE-style workflow commands
  #   - siteops keep the account/admin commands
  #
  # Tweak the affil/staff group names to fit your site, for example:
  #   required: "3 =iND =STAFF =SiteOP"
  #
  # Put specific commands before the wildcard.
  # Use !*, !flag, !=group, or !@nick to block.
  # ---------------------------------------------------------------------------
  # Basic user-facing SITE commands.
  - type: sitecmd
    path: HELP
    required: "*"
  - type: sitecmd
    path: RULES
    required: "*"
  - type: sitecmd
    path: BW
    required: "*"
  - type: sitecmd
    path: USER
    required: "*"
  - type: sitecmd
    path: SEEN
    required: "*"
  - type: sitecmd
    path: LASTLOGIN
    required: "*"
  - type: sitecmd
    path: GROUPS
    required: "*"
  - type: sitecmd
    path: GROUP
    required: "*"
  - type: sitecmd
    path: GINFO
    required: "*"
  - type: sitecmd
    path: TRAFFIC
    required: "*"
  - type: sitecmd
    path: SEARCH
    required: "*"
  - type: sitecmd
    path: RACE
    required: "*"
  - type: sitecmd
    path: XDUPE
    required: "*"
  - type: sitecmd
    path: INVITE
    required: "*"
  - type: sitecmd
    path: REQUEST
    required: "*"
  - type: sitecmd
    path: REQUESTS
    required: "*"
  - type: sitecmd
    path: REQFILL
    required: "*"
  - type: sitecmd
    path: REQFILLED
    required: "*"
  - type: sitecmd
    path: REQDEL
    required: "*"

  # Affil/staff workflow commands.
  # PRE is intentionally open here. The PRE plugin itself checks affil
  # membership via etc/affils.yml and rejects non-affils, so you do not need to
  # update permissions.yml every time you add an affil group.
  - type: sitecmd
    path: PRE
    required: "*"
  - type: sitecmd
    path: AFFILS
    required: "3 =iND =STAFF =SiteOP"
  - type: sitecmd
    path: WHO
    required: "=STAFF =SiteOP"
  - type: sitecmd
    path: SWHO
    required: "=STAFF =SiteOP"

  # Siteop/admin-only SITE commands.
  - type: sitecmd
    path: ADDUSER
    required: "1"
  - type: sitecmd
    path: GADDUSER
    required: "1"
  - type: sitecmd
    path: DELUSER
    required: "1"
  - type: sitecmd
    path: READD
    required: "1"
  - type: sitecmd
    path: RENUSER
    required: "1"
  - type: sitecmd
    path: CHPASS
    required: "1"
  - type: sitecmd
    path: ADDIP
    required: "1"
  - type: sitecmd
    path: DELIP
    required: "1"
  - type: sitecmd
    path: FLAGS
    required: "1"
  - type: sitecmd
    path: CHGRP
    required: "1"
  - type: sitecmd
    path: CHPGRP
    required: "1"
  - type: sitecmd
    path: GADMIN
    required: "1"
  - type: sitecmd
    path: GRPADD
    required: "1"
  - type: sitecmd
    path: GRPDEL
    required: "1"
  - type: sitecmd
    path: USERS
    required: "1"
  - type: sitecmd
    path: GRPNFO
    required: "1"
  - type: sitecmd
    path: TRAFFIC
    required: "1"
  - type: sitecmd
    path: UNDUPE
    required: "1"
  - type: sitecmd
    path: WIPE
    required: "1"
  - type: sitecmd
    path: KICK
    required: "1"
  - type: sitecmd
    path: CHMOD
    required: "1"
  - type: sitecmd
    path: REHASH
    required: "1"
  - type: sitecmd
    path: REMERGE
    required: "1"
  - type: sitecmd
    path: ADDAFFIL
    required: "1"
  - type: sitecmd
    path: DELAFFIL
    required: "1"
  - type: sitecmd
    path: REQWIPE
    required: "1"

  # Anything not explicitly listed above is denied.
  - type: sitecmd
    path: '*'
    required: "!*"

  # ---------------------------------------------------------------------------
  # Private paths: only matching users may enter or see these areas.
  # Affil PRE dirs should only need one glftpd-style line:
  #   privpath /site/PRE/GROUP =GROUP =SiteOP
  # ---------------------------------------------------------------------------
  - type: privpath
    path: /site/LINKS
    required: "1 =SiteOP"
  - type: privpath
    path: /site/PRE/SiteOP
    required: "1 =SiteOP"
  - type: privpath
    path: /site/PRE/TEST-GRP
    required: "1 =SiteOP"
  - type: privpath
    path: /site/ARCHiVE/backup
    required: "1 =SiteOP"
  - type: privpath
    path: /site/ARCHiVE/COMPLETE
    required: "1 =SiteOP"

  # ---------------------------------------------------------------------------
  # Transfers: everyone may upload, resume, and download below /site.
  # Speedtest traffic is made free in code; these rules only grant access.
  # ---------------------------------------------------------------------------
  - type: upload
    path: /site/*
    required: "*"

  - type: resume
    path: /site/*
    required: "*"
  - type: download
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # Directory creation/removal: everyone may create/remove dirs unless a more
  # specific rule above this says otherwise.
  # Keep the REQUESTS rule above the general /site rule for easy override later.
  # ---------------------------------------------------------------------------
  - type: makedir
    path: /site/REQUESTS/*
    required: "*"
  - type: makedir
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # Directory logs/search: PRE is restricted to flag 1; everything else is open.
  # ---------------------------------------------------------------------------
  - type: dirlog
    path: /site/PRE/*
    required: "1"
  - type: dirlog
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # Rename: flag 1 may rename anything. Everyone may rename their own entries.
  # ---------------------------------------------------------------------------
  - type: rename
    path: /site/*
    required: "1"
  - type: renameown
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # Nuke/unnuke: intended for NUKERS with separate flags for nuke and unnuke.
  # ---------------------------------------------------------------------------
  - type: nuke
    path: /site/*
    required: "1 A =NUKERS"
  - type: unnuke
    path: /site/*
    required: "1 B =NUKERS"

  # ---------------------------------------------------------------------------
  # Delete: flag 1 may delete anything. Everyone may delete their own entries.
  # ---------------------------------------------------------------------------
  - type: delete
    path: /site/PRE/*/*
    required: "*"
  - type: delete
    path: /site/*
    required: "1"
  - type: deleteown
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # File moves: Admin group only. This is for explicit filemove support.
  # ---------------------------------------------------------------------------
  - type: filemove
    path: /site/*
    required: "=Admin"

  # ---------------------------------------------------------------------------
  # Dupe-check exclusions: PRE, REQUESTS, and SPEEDTEST are intended to skip
  # dupe-db checks. Existing-file overwrite protection still applies.
  # ---------------------------------------------------------------------------
  - type: nodupecheck
    path: /site/PRE/*
    required: "*"
  - type: nodupecheck
    path: /site/REQUESTS/*
    required: "*"
  - type: nodupecheck
    path: /site/SPEEDTEST/*
    required: "*"
