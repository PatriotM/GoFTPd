# GoFTPd ACL rules.
#
# How matching works:
#   - Rules are checked top to bottom inside the requested type.
#   - The first matching rule decides access.
#   - If no action rule matches, matching privpath rules are checked.
#   - If nothing matches, flag 1 users are allowed by default.
#
# path:
#   - Paths are virtual paths under acl_base_path, normally /site.
#   - "*" is a wildcard. /site/* matches everything below /site.
#   - A trailing slash limits wildcard matches to one directory level,
#     glftpd-style:
#       /site/series/*/ matches /site/series/Release/
#       but not /site/series/Release/Sample/
#
# required:
#   "*"           anyone
#   "1"           user must have flag 1
#   "A"           user must have flag A
#   "=Admin"      user must be a member of group Admin
#   "1 =SiteOP"   user must have flag 1 AND be in group SiteOP
#   "1 A =NUKERS" user must have flags 1 and A AND be in group NUKERS
#
# rule types used here:
#   privpath      hides/blocks paths unless the user matches required
#   upload        STOR permission
#   resume        resume permission placeholder for clients/configs
#   download      RETR permission
#   makedir       MKD and RMD permission
#   dirlog        visibility for SITE SEARCH / dirlog-like listings
#   rename        rename permission
#   renameown     owner-only rename policy placeholder
#   nuke          SITE NUKE permission
#   unnuke        SITE UNNUKE permission
#   delete        DELE permission
#   deleteown     owner-only delete policy placeholder
#   filemove      cross-directory/manual move permission placeholder
#   nodupecheck   marks paths intended to skip dupe-db checks; overwrite
#                 protection still rejects uploads to an existing filename
#
rules:
  # ---------------------------------------------------------------------------
  # Private paths: only flag-1 SiteOP users may enter or see these areas.
  # ---------------------------------------------------------------------------
  - type: privpath
    path: /site/LINKS
    required: "1 =SiteOP"
  - type: privpath
    path: /site/PRE/SiteOP
    required: "1 =SiteOP"
  - type: privpath
    path: /site/PRE/TEST-GRP
    required: "1 =SiteOP"
  - type: privpath
    path: /site/ARCHiVE/backup
    required: "1 =SiteOP"
  - type: privpath
    path: /site/ARCHiVE/COMPLETE
    required: "1 =SiteOP"

  # ---------------------------------------------------------------------------
  # Transfers: everyone may upload, resume, and download below /site.
  # Speedtest traffic is made free in code; these rules only grant access.
  # ---------------------------------------------------------------------------
  - type: upload
    path: /site/*
    required: "*"

  - type: resume
    path: /site/*
    required: "*"
  - type: download
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # Directory creation/removal: flag 1 may create or remove dirs.
  # Keep the REQUESTS rule above the general /site rule for easy override later.
  # ---------------------------------------------------------------------------
  - type: makedir
    path: /site/REQUESTS/*
    required: "1"
  - type: makedir
    path: /site/*
    required: "1"

  # ---------------------------------------------------------------------------
  # Directory logs/search: PRE is restricted to flag 1; everything else is open.
  # ---------------------------------------------------------------------------
  - type: dirlog
    path: /site/PRE/*
    required: "1"
  - type: dirlog
    path: /site/*
    required: "*"

  # ---------------------------------------------------------------------------
  # Rename: flag 1 may rename. renameown is reserved for owner-only policies.
  # ---------------------------------------------------------------------------
  - type: rename
    path: /site/*
    required: "1"
  - type: renameown
    path: /site/*
    required: "1"

  # ---------------------------------------------------------------------------
  # Nuke/unnuke: intended for NUKERS with separate flags for nuke and unnuke.
  # ---------------------------------------------------------------------------
  - type: nuke
    path: /site/*
    required: "1 A =NUKERS"
  - type: unnuke
    path: /site/*
    required: "1 B =NUKERS"

  # ---------------------------------------------------------------------------
  # Delete: flag 1 may delete, including one level below /site/PRE.
  # deleteown is reserved for owner-only delete policies.
  # ---------------------------------------------------------------------------
  - type: delete
    path: /site/PRE/*/*
    required: "1"
  - type: delete
    path: /site/*
    required: "1"
  - type: deleteown
    path: /site/*
    required: "1"

  # ---------------------------------------------------------------------------
  # File moves: Admin group only. This is for explicit filemove support.
  # ---------------------------------------------------------------------------
  - type: filemove
    path: /site/*
    required: "=Admin"

  # ---------------------------------------------------------------------------
  # Dupe-check exclusions: PRE, REQUESTS, and SPEEDTEST are intended to skip
  # dupe-db checks. Existing-file overwrite protection still applies.
  # ---------------------------------------------------------------------------
  - type: nodupecheck
    path: /site/PRE/*
    required: "1"
  - type: nodupecheck
    path: /site/REQUESTS/*
    required: "1"
  - type: nodupecheck
    path: /site/SPEEDTEST/*
    required: "1"
