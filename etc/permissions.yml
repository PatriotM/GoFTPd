# =============================================================================
# GoFTPd ACL rules
#
# This file uses the structured ACL format. GoFTPd still understands the old
# flat `- type/path/required` layout too, but this version is easier to read
# and easier to extend without duplicating the same access strings everywhere.
#
# Matching rules
#   - Rules are checked top to bottom inside each rule type.
#   - The first matching rule decides access.
#   - If no action rule matches, matching `privpath` rules are checked.
#   - If nothing matches, flag 1 users are still allowed by default.
#
# Paths
#   - Paths are matched against the visible virtual FTP tree.
#   - With the default `acl_base_path: "/"`, a visible FTP path like `/MP3`
#     is checked as `/MP3` in this file.
#   - `*` is a wildcard. `/*` matches everything below that ACL prefix.
#   - A trailing slash keeps wildcard matching to one directory level:
#       `/TV/*/` matches `/TV/Release/`
#       but not `/TV/Release/Sample/`
#
# Required blocks
#   - `anyone: true` means public.
#   - `nobody: true` means explicit deny.
#   - `all_groups` / `any_groups` should be your normal policy language.
#   - `all_flags` / `any_flags` are best kept for legacy overrides and
#     exceptional broad powers, not everyday access policy.
#   - `users` / `not_users` match exact FTP usernames and are mainly useful for
#     service accounts such as bots.
#   - `not_flags` / `not_groups` are deny conditions.
#   - `any_of` lets you express cross-category OR rules when you really need
#     them, for example:
#       required:
#         any_of:
#           - all_groups: ["SiteOP"]
#           - all_flags: ["1"]
#     which means "SiteOP group OR legacy flag 1 override".
#
# Roles
#   - Roles are reusable requirement aliases.
#   - Use them with `required: $role_name`.
# =============================================================================

roles:
  # Public access.
  anyone:
    anyone: true

  # Explicit deny.
  nobody:
    nobody: true

  # Group-first siteop policy with a legacy flag 1 override.
  siteop:
    any_of:
      - all_groups: ["SiteOP"]
      - all_flags: ["1"]

  # Staff policy is group-based; SiteOPs are included too.
  staff:
    any_groups: ["STAFF", "SiteOP"]

  # Group-first nuker policy with a legacy flags fallback.
  nuker:
    any_of:
      - all_groups: ["NUKERS"]
      - all_flags: ["1", "A"]

  # Group-first unnuker policy with a legacy flags fallback.
  unnuker:
    any_of:
      - all_groups: ["NUKERS"]
      - all_flags: ["1", "B"]

  # Internal bot account used by automated nuke helpers.
  goftpd_bot:
    users: ["goftpd"]


rules:
  # ---------------------------------------------------------------------------
  # SITE commands
  #
  # Public commands are grouped together so the command surface is easy to scan.
  # PRE stays open here on purpose; the PRE plugin itself checks affils.yml.
  # ---------------------------------------------------------------------------
  sitecmd:
    - allow:
        - HELP
        - RULES
        - BW
        - USER
        - SEEN
        - LASTLOGIN
        - GROUPS
        - GROUP
        - GINFO
        - TRAFFIC
        - SEARCH
        - RACE
        - RESCAN
        - XDUPE
        - INVITE
        - GRP
        - NUKE
        - UNNUKE
        - REQUEST
        - REQUESTS
        - REQFILL
        - REQFILLED
        - REQDEL
        - BANNED
        - SELFIP
        - AFFILS
        - PRE
      required: $anyone

    - allow:
        - WHO
        - SWHO
      required: $staff

    - allow:
        - ADDUSER
        - GADDUSER
        - DELUSER
        - READD
        - RENUSER
        - CHPASS
        - ADDIP
        - DELIP
        - FLAGS
        - CHGRP
        - CHPGRP
        - GADMIN
        - GRPADD
        - GRPDEL
        - USERS
        - GRPNFO
        - UNDUPE
        - WIPE
        - KICK
        - CHMOD
        - REHASH
        - REMERGE
        - SLAVEBANS
        - SLAVEBAN
        - SLAVEUNBAN
        - ADDAFFIL
        - DELAFFIL
        - REQWIPE
      required: $siteop

    # Any SITE command not listed above is denied.
    - deny: ["*"]
      required: $nobody


  # ---------------------------------------------------------------------------
  # Private paths
  #
  # These paths are hidden or blocked unless the user matches the rule.
  # ---------------------------------------------------------------------------
  privpath:
    - path: /LINKS
      required:
        all_flags: ["1"]
        all_groups: ["SiteOP"]

    - path: /PRE/SiteOP
      required:
        all_flags: ["1"]
        all_groups: ["SiteOP"]

    - path: /PRE/TEST-GRP
      required:
        all_flags: ["1"]
        all_groups: ["SiteOP"]

    - path: /ARCHiVE/backup
      required:
        all_flags: ["1"]
        all_groups: ["SiteOP"]

    - path: /ARCHiVE/COMPLETE
      required:
        all_flags: ["1"]
        all_groups: ["SiteOP"]


  # ---------------------------------------------------------------------------
  # Transfers
  #
  # Speedtest is made free in code; these rules only grant access.
  # ---------------------------------------------------------------------------
  upload:
    - path: /*
      required: $anyone

  resume:
    - path: /*
      required: $anyone

  download:
    - path: /*
      required: $anyone


  # ---------------------------------------------------------------------------
  # Directory creation and removal
  #
  # Keep REQUESTS above the general root rule so it is easy to tighten later.
  # ---------------------------------------------------------------------------
  makedir:
    - path: /REQUESTS/*
      required: $anyone

    - path: /*
      required: $anyone


  # ---------------------------------------------------------------------------
  # Listings and dirlog
  #
  # PRE stays restricted; the rest of the tree is visible to everyone.
  # ---------------------------------------------------------------------------
  list:
    - path: /PRE/*
      required: $siteop

    - path: /*
      required: $anyone

  dirlog:
    - path: /PRE/*
      required: $siteop

    - path: /*
      required: $anyone


  # ---------------------------------------------------------------------------
  # Rename rules
  # ---------------------------------------------------------------------------
  rename:
    - path: /*
      required: $siteop

  renameown:
    - path: /*
      required: $anyone


  # ---------------------------------------------------------------------------
  # Nuke and unnuke
  # ---------------------------------------------------------------------------
  nuke:
    - path: /*
      required: $goftpd_bot

    - path: /*
      required: $nuker

  unnuke:
    - path: /*
      required: $goftpd_bot

    - path: /*
      required: $unnuker


  # ---------------------------------------------------------------------------
  # Delete rules
  # ---------------------------------------------------------------------------
  delete:
    - path: /PRE/*/*
      required: $anyone

    - path: /*
      required: $siteop

  deleteown:
    - path: /*
      required: $anyone


  # ---------------------------------------------------------------------------
  # Explicit file move support
  # ---------------------------------------------------------------------------
  filemove:
    - path: /*
      required:
        all_groups: ["Admin"]


  # ---------------------------------------------------------------------------
  # Dupe-check exclusions
  #
  # These paths skip dupe-db checks. Existing-file overwrite protection still
  # applies, so this does not allow clobbering an existing filename.
  # ---------------------------------------------------------------------------
  nodupecheck:
    - path: /PRE/*
      required: $anyone

    - path: /REQUESTS/*
      required: $anyone

    - path: /SPEEDTEST/*
      required: $anyone
