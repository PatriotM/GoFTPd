# =============================================================================
#  GoFTPd configuration — single file used for both master and slave roles.
#
#  The `mode:` setting decides which blocks are read. When `mode: master`,
#  the `slave:` block is ignored. When `mode: slave`, all master-only FTP/site/
#  plugin settings are ignored and only the shared top-level runtime settings
#  (for example TLS/logging/debug/timezone) plus the `slave:` block are used.
#  You can keep this same file on both boxes and just flip `mode:` + fill in
#  the relevant block.
# =============================================================================


# =============================================================================
#  Server identity — cosmetic, shown in welcome banners and stats.
# =============================================================================
sitename_long:  "GoFTPd"        # Full site name, shown in FTP banners
sitename_short: "GoFTPd"            # 2-3 char site tag used in race stats
# Version is loaded from sibling file: etc/version
timezone:       "Europe/Amsterdam" # IANA timezone for FTP LIST/MLSD/MDTM and dated dirs; empty/"Local" uses OS local time
show_cwd_banner: true           # Show the GoFTPd logo banner on CWD when there is no actual race data.
                                # Real race-stat banners are still shown regardless of this setting.
show_real_owner_group: false    # Show stored file owner/group in LIST, MLSD, and STAT -l for real VFS files.
                                # false keeps the virtual GoFTPd/GoFTPd ownership look.


# =============================================================================
#  Listening + mode
# =============================================================================
mode:         master            # "master" or "slave" — controls which blocks below are active
listen_port:  21212             # FTP control-channel port (master only)
public_ip:    "1.2.3.4"         # IP advertised in PASV responses (master only)
pasv_min:     25000             # Passive data-port range lower bound (master only)
pasv_max:     30000             #   -"- upper bound
passthrough:  true              # true = client connects directly to slave (recommended)
                                # false = master proxies all data (2x bandwidth cost)

# =============================================================================
#  Local VFS sync API - master-only, disabled by default.
#
#  Use this only when an external archiver already copied/verified/deleted data
#  outside GoFTPd and then needs to tell the master to update VFS metadata.
#  The API does not move bytes and does not scan disks.
#
#  Keep this bound to localhost or a private admin network and use a real token.
# =============================================================================
api:
  enabled: false
  listen: "127.0.0.1:5580"
  token: ""                     # Required when enabled. Send as Authorization: Bearer <token>


# =============================================================================
#  Master block — used when mode: master
#  Safe to leave filled on slave boxes; ignored there.
# =============================================================================
master:
  listen_host:       "0.0.0.0"  # Interface to bind slave-control socket
  control_port:      1099       # Port slaves connect to
  slave_allowlist: []           # Optional IP/CIDR allowlist for slave control connections.
                                # Leave empty to allow any source to attempt the slave handshake.
                                # Example: ["203.0.113.10", "2001:db8::10", "203.0.113.0/24"]
  slave_denylist_file: "etc/slave_denylist.txt" # Persistent exact IP / CIDR denylist for the slave control port.
                                # Managed manually or via SITE SLAVEBAN / SLAVEUNBAN / SLAVEBANS.
                                # SITE SLAVECLEARBAN clears only active temp bans.
  heartbeat_timeout: 60         # Seconds before the master marks a silent slave offline.
                                # The master will try a ping at about half this interval.
  slave_auth_fail_limit: 2      # Built-in guard for bad slave-port handshakes.
                                # After this many failed pre-auth attempts from one IP
                                # within the fail window, the IP is temporarily banned.
  slave_auth_fail_window_seconds: 900
  slave_auth_ban_seconds: 3600
  remerge_mode: "off"          # "off" waits for the remerge to finish before the
                                # slave becomes available. "instant" brings the
                                # slave online immediately and fills the VFS in
                                # the background.
  manual_remerge_mode: "instant" # Controls SITE REMERGE only. Default keeps
                                  # hand-triggered remerges online even when
                                  # startup remerge_mode stays "off".
  remerge_checksums: false      # If true, ask slaves for CRCs during remerge only for
                                # files missing a stored checksum in the VFS.
                                # Leave this off for imported/legacy trees unless you
                                # explicitly want that extra verification pass.
  remerge_checksum_threads: 1   # Max releases CRC-refreshed at the same time when
                                # remerge_checksums is true. Files inside one release
                                # are checked one-by-one. Raise to 2/4 only if disks
                                # can handle the extra reads.
# =============================================================================
#  Slave block — used when mode: slave
#  This is the only role-specific block a slave needs. On a master-only box,
#  you can leave this with placeholder values.
# =============================================================================
slave:
  name:          ""             # Unique slave identifier — MUST match an entry in `slaves:` below
  master_host:   ""             # IP or hostname of the master
  master_port:   1099           # Must match master's control_port
  roots:         []             # REQUIRED in slave mode. Normal roots mounted at "/".
                                # Example:
                                #   - "/goftpd/site"
  mounted_roots: []             # Optional extra physical roots mounted under a
                                # virtual path such as /ARCHiVE.
                                # Example:
                                #   - path: "/goftpd/DISK1"
                                #     mount_path: "/ARCHiVE"
                                #   - path: "/goftpd/DISK2"
                                #     mount_path: "/ARCHiVE"
                                #   - path: "/goftpd/DISK3"
                                #     mount_path: "/ARCHiVE"
                                #   - path: "/goftpd/DISK4"
                                #     mount_path: "/ARCHiVE"
                                # Handy when archive disks are already mounted
                                # separately (for example over NFS) and you want
                                # to expose them under one virtual /ARCHiVE tree
                                # without mergerfs. On a full remerge, normal
                                # roots are scanned first and mounted_roots are
                                # scanned afterwards, so this is a good fit for
                                # archive-style storage.
  pasv_port_min: 30000          # Passive-port range for client→slave data transfers
  pasv_port_max: 35000
  bind_ip:       ""             # Public IP advertised in PASV responses from this slave.
                                # If empty, slave auto-detects from the master connection.
                                # Set explicitly if the slave sits behind NAT.
  timeout:       60             # Slave-side inactivity timeout for master traffic.
                                # Keep this aligned with master.heartbeat_timeout.
  transfer_buffer_size: 262144  # Optional slave data-transfer buffer size in bytes.
                                # Default is 262144 (256 KiB). Minimum is 32768.


# =============================================================================
#  Slave policies - master-only
#
#  Common same-box setup:
#  If master and slave run on the same server and the slave is named LOCAL,
#  you normally only need the LOCAL policy below. Do not add sections, paths,
#  or weight unless you have multiple slaves and want route/affinity rules.
#  If you do not use slave.mounted_roots, remove the mounted_roots job and the
#  /ARCHiVE exclude from the site_root job.
#
#  Use ONE slaves: block. The examples below are commented; copy the shape you
#  need and remove comments.
#
# slaves:
#   - name: "LOCAL"             # Must match slave.name in the slave config
#     remerge:
#       jobs:
#         - name: "site_root"
#           enabled: true
#           interval_seconds: 21600
#           roots: "normal"    # normal slave.roots only
#           path: "/"
#           exclude_paths:
#             - "/ARCHiVE"     # skip archive here if archive is mounted_roots
#           delay_ms: 10
#           pause_on_active_transfers: 1
#           timeout_seconds: 3600 # Optional; default is 3600 for normal/all roots
#           skip_busy_slave: true
#         - name: "mounted_roots"
#           enabled: true
#           interval_seconds: 43200
#           roots: "mounted"   # slave.mounted_roots only
#           mount_paths: ["*"] # all mounted_roots mount_path values
#           delay_ms: 25
#           pause_on_active_transfers: 1
#           timeout_seconds: 86400 # Optional; default is 86400 for mounted roots
#           skip_busy_slave: true
#
#  Multi-slave routing options:
#  Control which sections/paths each slave accepts, and load-balancing weights.
#
#    name:     Must match the slave's `slave.name`
#    sections: First path component(s) this slave accepts (case-insensitive)
#    paths:    Optional glob patterns, e.g. "/TV-*/*" or "/MOVIES/*"
#    weight:   Higher = more uploads routed here (default 1). Load balancer
#              picks the slave with the lowest (activeTransfers / weight) score,
#              tie-breaking on most free disk space.
#    readonly: true means scan/download only. The slave is never selected for
#              uploads, even if no other slave policy matches.
#
#  - A slave with no policy OR with empty sections+paths accepts everything.
#  - If every policy excludes an upload, the master falls back to writable
#    available slaves only. Read-only archive slaves stay excluded.
#  - For an archive server, point the slave root at the existing archive tree,
#    set readonly: true, then remerge/rescan so the master learns the files.
#    sections/paths are optional on readonly slaves; use them only as
#    documentation/status metadata unless you want to describe the archive scope.
# =============================================================================
# slaves:
#   - name: "SLAVE1"
#     # Pin all /REQUESTS activity to one box:
#     # paths: ["/REQUESTS/*"]
#     sections: ["TV-1080P", "TV-720P"]
#     paths: ["/TV-*/*"]
#     weight: 2
#   - name: "SLAVE2"
#     sections: ["MP3", "FLAC"]
#     weight: 1
#   - name: "SLAVE3"
#     # no sections/paths = overflow/catch-all
#     weight: 1
#   - name: "ARCHIVE"
#     # Merged into the same virtual /TV-1080P, /X265, etc. paths for listing
#     # and downloads, but never used for uploads or new race dirs.
#     # sections are optional here; omit them if the archive root speaks for itself.
#     sections: ["TV-1080P", "TV-720P", "X265", "BLURAY"]
#     readonly: true
#     weight: 1


# =============================================================================
#  Section directories - master-only
#  These dirs are kept alive in the master's VFS and created automatically on
#  matching writable slaves when they connect or after SITE REHASH.
#
#  Nested dirs are supported, e.g. "/FOREIGN/TV-NL".
#  Plugin storage roots such as /REQUESTS and /SPEEDTEST are created by their
#  plugins and should stay physical on a writable slave, so they do not need to
#  be listed here.
#  Read-only slaves are never modified.
# =============================================================================
sections:
  - "/0DAY"
  - "/APPS"
  - "/ARCHiVE"
  - "/BLURAY"
  - "/BLURAY-UHD"
  - "/DVDR"
  - "/EBOOKS"
  - "/FLAC"
  - "/FOREIGN"
  - "/FOREIGN/TV-CZ"
  - "/FOREIGN/TV-DE"
  - "/FOREIGN/TV-DK"
  - "/FOREIGN/TV-ES"
  - "/FOREIGN/TV-FI"
  - "/FOREIGN/TV-FR"
  - "/FOREIGN/TV-IT"
  - "/FOREIGN/TV-NL"
  - "/FOREIGN/TV-NO"
  - "/FOREIGN/TV-PL"
  - "/FOREIGN/TV-SE"
  - "/FOREIGN/TV-SK"
  - "/FOREIGN/X264-HD-FOREIGN"
  - "/FOREIGN/X264-SD-FOREIGN"
  - "/FOREIGN/X265-FOREIGN"
  - "/GAMES"
  - "/iNFO"
  - "/MBLURAY"
  - "/MDVDR"
  - "/MP3"
  - "/MVID"
  - "/NSW"
  - "/PRE"
  - "/PS5"
  - "/TV-1080P"
  - "/TV-2160P"
  - "/TV-720P"
  - "/TV-BLURAY"
  - "/TV-HDRiP"
  - "/TV-SD"
  - "/TV-SPORTS"
  - "/X264-HD-1080P"
  - "/X264-HD-720P"
  - "/X264-SD"
  - "/X265"
  - "/XXX-0DAY"
  - "/XXX-HD"
  - "/XXX-IMAGESETS"
  - "/XXX-SD"

# =============================================================================
#  Hidden VFS paths - master-only
#  These virtual paths are ignored during slave remerge and kept out of LIST/STAT
#  results, even if they physically exist on a slave root. Use this to keep
#  private helper folders or local-only storage trees out of the FTP view.
#
#  Hiding a parent path hides everything below it too.
#  This does not delete anything from the slave disk.
# =============================================================================
hidden_vfs_paths:
  # - "/ARCHiVE/_incoming"
  # - "/private-tools"

# =============================================================================
#  Exclude VFS paths — do not index these subtrees into the master VFS.
#
#  Use this for huge backup/archive trees you never want listed, searched, or
#  remerged into the visible FTP view. Unlike hidden_vfs_paths, this also skips
#  these paths during slave remerge processing.
# =============================================================================
exclude_vfs_paths:
  # - "/backup"
  # - "/ARCHiVE"


# =============================================================================
#  Storage + paths
# =============================================================================
storage_path:   ./site          # Master: local fallback tree.
acl_base_path:  "/"             # Match ACL rules against the visible virtual FTP tree.
passwd_file:    "etc/passwd"    # Password hash file (bcrypt / apr1)
msg_path:       "etc/msgs"      # Directory with welcome/rules/goodbye message templates


# =============================================================================
#  TLS — used on both master and slaves (same cert pair on all boxes).
#  tls_enabled makes TLS available. The require_* flags below actually force
#  secure logins and encrypted data transfers for normal FTP users.
# =============================================================================
tls_enabled: true
tls_cert:    ./etc/certs/server.crt
tls_key:     ./etc/certs/server.key
require_tls_control: true      # Force AUTH TLS before USER/PASS login
require_tls_data:    true      # Force PROT P for uploads/downloads
tls_exempt_users:    []        # Optional plaintext bypass for trusted local users only


# =============================================================================
#  Limits + credits
# =============================================================================
creditcheck:     true           # Enforce user credit/ratio rules on downloads
free_space_mb:   2048           # Reject uploads when free space drops below this
max_connections: 300            # Global concurrent FTP session cap


# =============================================================================
#  show_diz — files whose contents are displayed on CWD as part of the 250- reply.
#  Map of filename → who_can_see ("*" = all users, or a flag like "1" for siteop).
#  The tvmaze / imdb plugins write .tvmaze / .imdb files automatically on MKD.
# =============================================================================
show_diz:
  .message: "*"
  .imdb:    "*"
  .tvmaze:  "*"
  file_id.diz: "*"


# =============================================================================
#  NUKE
# =============================================================================
nuke_max_multiplier: 50         # Highest multiplier a siteop can nuke with
nukedir_style:       "[NUKED]-%N"   # Renamed dir pattern (%N = release name)


# =============================================================================
#  Plugins — extend the daemon with custom behavior. Each plugin receives
#  events (MKDIR, UPLOAD, DELETE, NUKE, etc.) and has access to the master
#  bridge for reading/writing files on slaves.
#
#  The built-in zipscript module is configured separately under `zipscript:`.
#  It handles SFV/race/COMPLETE-banner logic inside the daemon hot path.
#
#  Built-in plugins:
#    dateddirs - creates daily race dirs, !Today_<SECTION> symlinks,
#                read-only old date dirs, and NEWDAY events
#    tvmaze  — looks up TV shows on TVMaze when a release dir is created,
#              writes .tvmaze into the dir (shown via show_diz above)
#    imdb    — same for movies via imdbapi.dev, writes .imdb
#    pretime - looks up release pre times from SQLite, MySQL, or HTTP APIs
#              and emits NEWPRETIME / OLDPRETIME append announces
#    pre     - handles SITE PRE for affil staging dirs and PREBW announces
#    request - handles SITE REQUEST/REQUESTS/REQFILL/REQTOP/REQDEL/REQWIPE
#    speedtest - creates /SPEEDTEST/100MB, 500MB, 1000MB and
#                emits SPEEDTEST announces without applying credits
  #    slowkick - aborts and kicks slow uploads/downloads, and can tempban
#                 the FTP user briefly so they cannot instantly re-grab slots
#    spacekeeper - watches slave free space and deletes the oldest eligible
#                  releases from configured virtual paths when a slave drops
#                  below a configured threshold
#
#  To add your own plugin:
#    1. Create /plugins/<name>/handler.go implementing plugin.Plugin
#    2. Add a case for it in cmd/goftpd/main.go's plugin switch
#    3. Add an entry below with `enabled: true` and a `config_file`
#
#  Section matching is case-insensitive substring — "TV" matches TV-1080P,
#  TV-720P, TV-UHD, etc. Only plugins where enabled=true are loaded.
#  The repo ships `config.yml.dist` files for plugin defaults; copy them to
#  `config.yml` so Git updates do not overwrite your local plugin settings.
# =============================================================================
zipscript:
  enabled: true                # master-side zipscript module on/off
  debug: false                 # reserved for zipscript-specific debug output

  race:
    enabled: true              # enables race tracking derived labels/stats
    max_users_in_top: 15       # limit HOF / SITE RACE user rows (0 = unlimited)
    max_groups_in_top: 0       # limit FTP group rows (0 = unlimited)
    mask_user_group_names: false # mask rendered race user/group names as F****y / A***n
    complete_banner: true      # show [SITE] - ( ... COMPLETE ... ) - [SITE]
    music_complete_genre: true # add genre/year on MP3/FLAC COMPLETE banner
    announce_norace: true      # emit COMPLETE for first payload in non-SFV dirs too
    announce_subdirs: true     # announce helper release subdirs like Sample, Proof, and Subs; set false to suppress them entirely
    cwd_race_stats: true       # show race stats on CWD for SFV releases
    stor_race_stats: true      # show race stats after STOR for SFV releases
    cwd_zip_race_stats: true   # show race stats on CWD for ZIP releases
    stor_zip_race_stats: true  # show race stats after STOR for ZIP releases

  hooks:
    on_complete:
      enabled: false           # run an external command after a release completes
      run_on: "master"         # master or slave; slave runs on the owning slave where the files live
      slave_name: ""           # optional override when run_on=slave; normally leave empty to auto-pick the owning slave
      command: "/usr/bin/python3"
      args: ["/goftpd/bin/on_complete.py"]
      timeout_seconds: 30
      extra_env:
        EXAMPLE: "1"
      # Exported env vars include:
      #   GOFTPD_EVENT=COMPLETE
      #   GOFTPD_PATH / GOFTPD_DIR
      #   GOFTPD_HOOK_TARGET
      #   GOFTPD_SLAVE_NAME (when run_on=slave)
      #   GOFTPD_LOCAL_PATH (when run_on=slave; local filesystem path on that slave)
      #   GOFTPD_RELNAME
      #   GOFTPD_RELEASE_NAME
      #   GOFTPD_RELEASE_SUBDIR
      #   GOFTPD_SECTION
      #   GOFTPD_SECTION_ROOT
      #   GOFTPD_TOTAL_BYTES / GOFTPD_TOTAL_MB / GOFTPD_TOTAL_FILES
      #   GOFTPD_DURATION_MS / GOFTPD_DURATION
      #   GOFTPD_AVG_SPEED_MB
      #   GOFTPD_USER_COUNT
      # plus GOFTPD_<KEY> for zipscript race vars such as T_MBYTES/T_FILES/etc.

  sfv:
    force_first: false         # pzs-ng style: allow payload before .sfv; the release is checked once the .sfv lands
    deny_double_sfv: true      # reject a second .sfv in the same release dir
    restrict_files: true       # once an .sfv exists, payload files should be listed in it
    delete_bad_crc: true       # delete uploaded files that fail SFV CRC
    ignore_zero_size: true     # delete zero-byte uploads instead of keeping them
    allow_resume: false        # allow REST resume for STOR / RETR when enabled
    path_check: ["*"]          # scope where sfv-first is enforced
    path_ignore: ["/PRE/*", "/REQUESTS/*", "*/Subs", "*/Cover", "*/Covers", "/SPEEDTEST/*"] # paths excluded from sfv-first enforcement
    users: ["*"]               # users/groups affected by sfv-first; use ["!=SiteOP", "*"] to exempt a group
    deny_subdir: false         # refuse .sfv upload if matching subdirs already exist in the release
    deny_subdir_include: ".*"  # regex of subdir names that should block a later .sfv upload when deny_subdir is enabled
    deny_subdir_exclude: ""    # optional regex of subdir names to ignore for that deny_subdir check
    allow_no_ext: true         # allow extensionless uploads when sfv-first is enabled

  zip:
    integrity_check: true      # verify uploaded .zip integrity and re-check it during SITE RESCAN
    cwd_diz_info: true         # show file_id.diz text on CWD in ZIP releases

  list:
    statusbar_enabled: true    # enable zipscript status rows in listings
    statusbar_directory: true  # render the status row like a directory; false makes it look like a file
    missing_files_enabled: true # show virtual missing-file rows in listings

  sections:
    sfv:
      - "/0DAY/*/*"
      - "/APPS/*"
      - "/BLURAY/*"
      - "/BLURAY-UHD/*"
      - "/DVDR/*"
      - "/EBOOKS/*/*"
      - "/FLAC/*/*"
      - "/FOREIGN/TV-CZ/*"
      - "/FOREIGN/TV-DE/*"
      - "/FOREIGN/TV-DK/*"
      - "/FOREIGN/TV-ES/*"
      - "/FOREIGN/TV-FI/*"
      - "/FOREIGN/TV-FR/*"
      - "/FOREIGN/TV-IT/*"
      - "/FOREIGN/TV-NL/*"
      - "/FOREIGN/TV-NO/*"
      - "/FOREIGN/TV-PL/*"
      - "/FOREIGN/TV-SE/*"
      - "/FOREIGN/TV-SK/*"
      - "/FOREIGN/X264-HD-FOREIGN/*"
      - "/FOREIGN/X264-SD-FOREIGN/*"
      - "/FOREIGN/X265-FOREIGN/*"
      - "/GAMES/*"
      - "/MBLURAY/*"
      - "/MDVDR/*"
      - "/MVID/*"
      - "/MP3/*/*"
      - "/NSW/*"
      - "/PRE/*/*"
      - "/PS5/*"
      - "/REQUESTS/*/*"
      - "/TV-1080P/*"
      - "/TV-2160P/*"
      - "/TV-720P/*"
      - "/TV-BLURAY/*"
      - "/TV-HDRiP/*"
      - "/TV-SD/*"
      - "/TV-SPORTS/*"
      - "/X264-HD-1080P/*"
      - "/X264-HD-720P/*"
      - "/X264-SD/*"
      - "/X265/*"
      - "/XXX-0DAY/*/*"
      - "/XXX-HD/*"
      - "/XXX-IMAGESETS/*"
      - "/XXX-SD/*"
    zip:
      - "/0DAY/*/*"
      - "/EBOOKS/*/*"
      - "/XXX-IMAGESETS/*"
    nocheck:
      - "/PRIVATE/*"
      - "/LINKS/*"
      - "/PRE/*"
    ignored_release_subdirs: ["Sample", "Proof", "Subs", "Subtitles", "Covers"] # helper dirs inside a release that should not get NEW/RACE/COMPLETE or marker handling
    # release_check controls where the stricter "this should end up as a proper
    # complete release" behavior applies:
    #   - incomplete markers
    #   - missing-NFO markers
    #   - other release-completeness checks
    #
    # If left empty, it falls back to the sfv list above.
    # Older configs may still use `cleanup:`; that alias is still accepted.
    release_check:
      - "/0DAY/*/*"
      - "/APPS/*"
      - "/BLURAY/*"
      - "/BLURAY-UHD/*"
      - "/DVDR/*"
      - "/EBOOKS/*/*"
      - "/FLAC/*/*"
      - "/FOREIGN/TV-CZ/*"
      - "/FOREIGN/TV-DE/*"
      - "/FOREIGN/TV-DK/*"
      - "/FOREIGN/TV-ES/*"
      - "/FOREIGN/TV-FI/*"
      - "/FOREIGN/TV-FR/*"
      - "/FOREIGN/TV-IT/*"
      - "/FOREIGN/TV-NL/*"
      - "/FOREIGN/TV-NO/*"
      - "/FOREIGN/TV-PL/*"
      - "/FOREIGN/TV-SE/*"
      - "/FOREIGN/TV-SK/*"
      - "/FOREIGN/X264-HD-FOREIGN/*"
      - "/FOREIGN/X264-SD-FOREIGN/*"
      - "/FOREIGN/X265-FOREIGN/*"
      - "/GAMES/*"
      - "/MBLURAY/*"
      - "/MDVDR/*"
      - "/MVID/*"
      - "/MP3/*/*"
      - "/NSW/*"
      - "/PRE/*/*"
      - "/PS5/*"
      - "/REQUESTS/*/*"
      - "/TV-1080P/*"
      - "/TV-2160P/*"
      - "/TV-720P/*"
      - "/TV-BLURAY/*"
      - "/TV-HDRiP/*"
      - "/TV-SD/*"
      - "/TV-SPORTS/*"
      - "/X264-HD-1080P/*"
      - "/X264-HD-720P/*"
      - "/X264-SD/*"
      - "/X265/*"
      - "/XXX-0DAY/*/*"
      - "/XXX-HD/*"
      - "/XXX-IMAGESETS/*"
      - "/XXX-SD/*"

  incomplete:
    enabled: true                    # enable virtual incomplete / missing-file markers in section listings
    indicator: "[incomplete]-%0"     # shown for releases with missing SFV payload files
    no_sfv_indicator: "[no-sfv]-%0"  # shown when a release dir has files but no .sfv yet
    nfo_indicator: "[no-nfo]-%0"     # shown when a release_check release has no .nfo
    cd_indicator: "[incomplete]-(%0)-%1" # shown for incomplete CD1 / DISC2 style child dirs
    mark_empty_dirs_on_rescan: true  # empty rescanned release dirs also get incomplete markers

  allowed_files:
    allowed_types: ["nfo", "jpg", "jpeg", "cue", "m3u", "txt", "vob", "png", "m2ts", "ts", "log", "mkv", "mp4", "avi", "diz", "zip"] # allowed extra file types outside SFV payload checks
    ignored_types: ["diz", "debug", "message", "imdb", "html", "url", "m3u", "metadata"] # ignored by force-first / type checks

  audio:
    enabled: true               # enforce audio policy on MP3 / FLAC uploads
    sections: ["MP3", "FLAC"]   # sections where built-in audio probing/checks apply
    extensions: ["flac", "mp3", "m4a", "wav"] # audio payload extensions handled by the built-in probe
    cwd_mp3_info: true          # show MP3 info on CWD
    stor_mp3_info: true         # show MP3 info after STOR
    cwd_flac_info: true         # show FLAC info on CWD
    stor_flac_info: true        # show FLAC info after STOR
    cbr_check: false            # require CBR and match allowed_constant_bitrates
    year_check: false           # require year to be in allowed_years
    banned_genre_check: true    # delete uploads with banned genres
    allowed_genre_check: false  # if true, only genres in allowed_genres pass
    allowed_constant_bitrates: [192, 320] # checked when cbr_check is enabled
    allowed_years: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025] # checked when year_check is enabled
    banned_genres:
      - "Christian Rap"
      - "Christian Gangsta Rap"
      - "Contemporary Christian"
      - "Christian Rock"
    allowed_genres: []          # used when allowed_genre_check is true
    genre_path: "/music.by.genre"   # sort-tree root for genre links
    artist_path: "/music.by.artist" # sort-tree root for artist links
    year_path: "/music.by.year"     # sort-tree root for year links
    group_path: "/music.by.group"   # sort-tree root for release group links
    sort:
      genre: false              # create <genre_path>/<Genre>/<Release> symlinks
      artist: false             # create <artist_path>/<Artist>/<Release> symlinks
      year: false               # create <year_path>/<Year>/<Release> symlinks
      group: false              # create <group_path>/<Group>/<Release> symlinks
      separate_by_section: true # keep MP3 and FLAC in their own sort buckets, e.g. <genre_path>/MP3/<Genre>/...

  media:
    enabled: true               # enable built-in sample/video probing
    # Match against the logical section name from the release path.
    # For nested FOREIGN/PRE/ARCHiVE paths use the child section name, e.g.
    # TV-NO or X265-FOREIGN instead of FOREIGN/TV-NO.
    sections: ["BLURAY", "DVDR", "TV-1080P", "TV-720P", "TV-BLURAY", "X264-HD-1080P", "X264-HD-720P", "X264-SD", "X265", "TV-NO", "X265-FOREIGN"]
    sample_only: true           # only probe files under Sample/Samples or *.sample.*
    video_extensions: ["mkv", "mp4", "avi", "m2ts", "ts"]

plugins:
  # `enabled` here controls whether the daemon loads the plugin at all.
  # The referenced plugin config files only carry plugin-specific settings.
  autonuke:
    enabled: false
    config_file: "plugins/autonuke/config.yml"
  dateddirs:
    enabled: true
    config_file: "plugins/dateddirs/config.yml"
  tvmaze:
    enabled: true
    config_file: "plugins/tvmaze/config.yml"
  imdb:
    enabled: true
    config_file: "plugins/imdb/config.yml"
  pretime:
    enabled: false
    # Appends a pretime announce after NEW when a lookup succeeds.
    # SQLite, MySQL, and HTTP/JSON providers are configured in the plugin
    # dist file without touching the main daemon config.
    config_file: "plugins/pretime/config.yml"
  speedtest:
    enabled: true
    config_file: "plugins/speedtest/config.yml"
  slowkick:
    enabled: true
    # Live transfer speed floors with optional tempban/announce. Enforcement
    # happens in the slave transfer loop, not via a coarse polling observer.
    config_file: "plugins/slowkick/config.yml"
    # In plugins/slowkick/config.yml you can also exclude tiny metadata files:
    #   exclude_extensions:
    #     - sfv
    #     - nfo
  spacekeeper:
    enabled: false
    # Free-space and archive policy plugin using virtual FTP paths.
    # In plugins/spacekeeper/config.yml:
    #   - delete_oldest rules do not use destination
    #   - archive_oldest rules do use destination
    config_file: "plugins/spacekeeper/config.yml"
  request:
    enabled: true
    # TUR-style request manager:
    #   SITE REQUEST Release.Name-GRP
    #   SITE REQUESTS
    #   SITE REQFILL <number|Release.Name-GRP>
    #   SITE REQTOP [limit]
    #   SITE REQDEL <number|Release.Name-GRP>
    #   SITE REQWIPE <number|Release.Name-GRP>
    # Enabling the plugin creates this base directory on startup.
    # Request list and REQTOP fill counters are stored in VFS metadata on that
    # request root, not in .requests/.reqfills text files.
    # Optional in plugins/request/config.yml:
    #   storage_slave: "LOCAL"  # keep request metadata and REQ-/FILLED-* dirs on one slave
    config_file: "plugins/request/config.yml"
  releaseguard:
    enabled: false
    # Blocks bad MKD release names before the directory is created.
    # Example use: only allow TV-style names in /TV-FR with:
    #   allow_dirs:
    #     - path: "/TV-FR/*"
    #       pattern: "\\.S[0-9]{2}E[0-9]{2}\\."
    config_file: "plugins/releaseguard/config.yml"
  pre:
    enabled: true
    # Shared affil file used by the daemon PRE plugin and the sitebot Affils plugin.
    config_file: "plugins/pre/config.yml"


# =============================================================================
#  Sitebot integration
#    - event_fifo:     Named pipe the daemon writes events to, sitebot reads from
#    - sitebot_config: Path to the sitebot's config.yml. SITE INVITE reads
#                      irc.channels + invite_channels from there (flag rules
#                      restricting which channels which users can be invited to).
#                      SITE IRC also reads the IRC connection info from there.
#    - blowfish_*:     Optional daemon-side mirror for SITE BLOWFISH. If left
#                      empty, SITE BLOWFISH falls back to parsing sitebot_config.
# =============================================================================
event_fifo:     "/GoFTPd/etc/goftpd.sitebot.fifo"
sitebot_config: "/GoFTPd/sitebot/etc/config.yml"
blowfish_private_key: ""
blowfish_keys:
  # "#goftpd": "cbc:YourBlowfishKeyHere123456"
  # "#goftpd-staff": "cbc:YourBlowfishKeyHere123456"


# =============================================================================
#  Dupe detection — prevents re-uploading known releases.
# =============================================================================
xdupe_enabled: true
xdupe_db_path: "./logs/xdupe.db"


# =============================================================================
#  Debug — verbose logging for all subsystems.
#  When debug is true AND log_file is set, output goes to the rotating log
#  file. Set log_console: true to mirror that same output to the console.
#  The active file is always <log_file>; previous days are archived as
#  <log_file>.YYYY-MM-DD. log_delete_after_days removes rotated log files
#  older than that many days. log_keep_days is kept as an older alias.
#  Set log_file: "" to disable file logging.
# =============================================================================
debug:          false
log_file:       "logs/goftpd.log"
log_delete_after_days: 1
log_keep_days:  1
log_console:    true
trace_log_file: ""
trace_log_keep_days: 1

