# ============================================================================
# GoFTPd - MASTER Example
# ============================================================================
# Copy this to etc/config.yml on the MASTER machine.
#
# The master:
#   - Listens for FTP clients on listen_port
#   - Listens for slave connections on control_port
#   - Keeps VFS in memory, routes transfers to slaves
#   - Runs zipscript via VFS metadata (no disk writes)
# ============================================================================

sitename_long: "MySite"
sitename_short: "MS"
version: "1.0.2b"

listen_port: 21212
public_ip: "1.2.3.4"
pasv_min: 25000
pasv_max: 30000

mode: master
passthrough: true

master:
  listen_host: "0.0.0.0"
  control_port: 1099
  heartbeat_timeout: 60

slave:
  name: ""
  master_host: ""
  master_port: 1099
  roots: []

# ============================================================================
# Per-slave routing policies (master mode only)
# ============================================================================
# Control which sections/paths go to which slave, and how uploads are
# load-balanced across multiple slaves.
#
# - "name" must match the slave's registered name (slave's `slave.name`).
# - "sections" restricts this slave to the listed top-level sections
#   (case-insensitive). Empty = any section.
# - "paths" is an optional list of glob patterns; a match also allows routing.
#   e.g. "/TV-*/*" or "/MOVIES/*".
# - "weight" biases the load balancer. Default is 1. A slave with weight=2
#   receives roughly twice as many concurrent uploads as a weight=1 slave
#   (score = activeTransfers / weight; lowest score wins; ties go to most
#   free space).
# - Omit this block or list a slave without it to let the slave accept
#   everything (no restrictions).
# - If every policy excludes the current upload, the master falls back to
#   picking from ALL available slaves (fail-open).
#
# Example: route TV to slave1 (weight 2), music to slave2, let slave3 catch
# anything else as overflow capacity.
#
# slaves:
#   - name: "SLAVE1"
#     sections: ["TV-1080P", "TV-720P"]
#     paths: ["/TV-*/*"]
#     weight: 2
#   - name: "SLAVE2"
#     sections: ["MP3", "FLAC"]
#     weight: 1
#   - name: "SLAVE3"
#     # no sections/paths = fallback/overflow for anything not matched above
#     weight: 1
# ============================================================================

storage_path: ./site
acl_base_path: "/site"
passwd_file: "etc/passwd"
msg_path: "etc/msgs"

tls_enabled: true
tls_cert: ./etc/server.crt
tls_key: ./etc/server.key

creditcheck: true
free_space_mb: 2048
max_connections: 300

show_diz:
  .message: "*"
  .imdb: "*"

incomplete_indicator: "[incomplete]-%0"

nuke_max_multiplier: 50
nukedir_style: "[NUKED]-%N"

plugins:
  imdb:
    enabled: true
  tvmaze:
    enabled: true

xdupe_enabled: true
xdupe_db_path: "./logs/xdupe.db"

debug: false
