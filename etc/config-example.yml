# =============================================================================
#  GoFTPd configuration — single file used for both master and slave roles.
#
#  The `mode:` setting decides which blocks are read. When `mode: master`,
#  the `slave:` block is ignored (and vice versa). You can keep this same
#  file on both boxes and just flip `mode:` + fill in the relevant block.
# =============================================================================


# =============================================================================
#  Server identity — cosmetic, shown in welcome banners and stats.
# =============================================================================
sitename_long:  "GoFTPd"        # Full site name, shown in FTP banners
sitename_short: "GoFTPd"            # 2-3 char site tag used in race stats
version:        "1.0.4b"        # Displayed in FEAT / LIST headers
timezone:       "Europe/Amsterdam" # IANA timezone for FTP LIST/MLSD/MDTM and dated dirs; empty/"Local" uses OS local time


# =============================================================================
#  Listening + mode
# =============================================================================
mode:         master            # "master" or "slave" — controls which blocks below are active
listen_port:  21212             # FTP control-channel port (master only)
public_ip:    "1.2.3.4"         # IP advertised in PASV responses (master only)
pasv_min:     25000             # Passive data-port range lower bound (master only)
pasv_max:     30000             #   -"- upper bound
passthrough:  true              # true = client connects directly to slave (recommended)
                                # false = master proxies all data (2x bandwidth cost)


# =============================================================================
#  Master block — used when mode: master
#  Safe to leave filled on slave boxes; ignored there.
# =============================================================================
master:
  listen_host:       "0.0.0.0"  # Interface to bind slave-control socket
  control_port:      1099       # Port slaves connect to
  heartbeat_timeout: 60         # Seconds before a silent slave is marked offline


# =============================================================================
#  Slave block — used when mode: slave
#  On a master-only box, you can leave this with placeholder values.
# =============================================================================
slave:
  name:          ""             # Unique slave identifier — MUST match an entry in `slaves:` below
  master_host:   ""             # IP or hostname of the master
  master_port:   1099           # Must match master's control_port
  roots:         []             # List of root dirs this slave serves, e.g. ["/data/site"]
  pasv_port_min: 30000          # Passive-port range for client→slave data transfers
  pasv_port_max: 35000
  bind_ip:       ""             # Public IP advertised in PASV responses from this slave.
                                # If empty, slave auto-detects from the master connection.
                                # Set explicitly if the slave sits behind NAT.
  timeout:       60             # Network timeout in seconds for slave↔master operations


# =============================================================================
#  Slave routing policies — master-only
#  Control which sections/paths each slave accepts, and load-balancing weights.
#
#    name:     Must match the slave's `slave.name`
#    sections: First path component(s) this slave accepts (case-insensitive)
#    paths:    Optional glob patterns, e.g. "/TV-*/*" or "/MOVIES/*"
#    weight:   Higher = more uploads routed here (default 1). Load balancer
#              picks the slave with the lowest (activeTransfers / weight) score,
#              tie-breaking on most free disk space.
#    readonly: true means scan/download only. The slave is never selected for
#              uploads, even if no other slave policy matches.
#
#  - A slave with no policy OR with empty sections+paths accepts everything.
#  - If every policy excludes an upload, the master falls back to writable
#    available slaves only. Read-only archive slaves stay excluded.
#  - For an archive server, point the slave root at the existing archive tree,
#    set readonly: true, then remerge/rescan so the master learns the files.
#    sections/paths are optional on readonly slaves; use them only as
#    documentation/status metadata unless you want to describe the archive scope.
# =============================================================================
# slaves:
#   - name: "SLAVE1"
#     sections: ["TV-1080P", "TV-720P"]
#     paths: ["/TV-*/*"]
#     weight: 2
#   - name: "SLAVE2"
#     sections: ["MP3", "FLAC"]
#     weight: 1
#   - name: "SLAVE3"
#     # no sections/paths = overflow/catch-all
#     weight: 1
#   - name: "ARCHIVE"
#     # Merged into the same virtual /TV-1080P, /X265, etc. paths for listing
#     # and downloads, but never used for uploads or new race dirs.
#     # sections are optional here; omit them if the archive root speaks for itself.
#     sections: ["TV-1080P", "TV-720P", "X265", "BLURAY"]
#     readonly: true
#     weight: 1


# =============================================================================
#  Section directories - master-only
#  These dirs are kept alive in the master's VFS and created automatically on
#  matching writable slaves when they connect or after SITE REHASH.
#
#  Nested dirs are supported, e.g. "/FOREIGN/TV-NL".
#  Read-only slaves are never modified.
# =============================================================================
sections:
  - "/0DAY"
  - "/APPS"
  - "/ARCHiVE"
  - "/BLURAY"
  - "/BLURAY-UHD"
  - "/DVDR"
  - "/EBOOKS"
  - "/FLAC"
  - "/FOREIGN"
  - "/FOREIGN/TV-CZ"
  - "/FOREIGN/TV-DE"
  - "/FOREIGN/TV-DK"
  - "/FOREIGN/TV-ES"
  - "/FOREIGN/TV-FI"
  - "/FOREIGN/TV-FR"
  - "/FOREIGN/TV-IT"
  - "/FOREIGN/TV-NL"
  - "/FOREIGN/TV-NO"
  - "/FOREIGN/TV-PL"
  - "/FOREIGN/TV-SE"
  - "/FOREIGN/TV-SK"
  - "/FOREIGN/X264-HD-FOREIGN"
  - "/FOREIGN/X264-SD-FOREIGN"
  - "/FOREIGN/X265-FOREIGN"
  - "/GAMES"
  - "/iNFO"
  - "/MBLURAY"
  - "/MDVDR"
  - "/MP3"
  - "/MVID"
  - "/NSW"
  - "/PRE"
  - "/PS5"
  - "/REQUESTS"
  - "/SPEEDTEST"
  - "/TV-1080P"
  - "/TV-2160P"
  - "/TV-720P"
  - "/TV-BLURAY"
  - "/TV-HDRIP"
  - "/TV-SD"
  - "/TV-SPORTS"
  - "/X264-HD-1080P"
  - "/X264-HD-720P"
  - "/X264-SD"
  - "/X265"
  - "/XXX-0DAY"
  - "/XXX-HD"
  - "/XXX-IMAGESETS"
  - "/XXX-SD"


# =============================================================================
#  Storage + paths
# =============================================================================
storage_path:   ./site          # Master: fallback path. Slave: default root if `roots:` empty.
acl_base_path:  "/site"         # Virtual FTP root as seen by clients (usually "/site")
passwd_file:    "etc/passwd"    # Password hash file (bcrypt / apr1)
msg_path:       "etc/msgs"      # Directory with welcome/rules/goodbye message templates


# =============================================================================
#  TLS — used on both master and slaves (same cert pair on all boxes).
# =============================================================================
tls_enabled: true
tls_cert:    ./etc/server.crt
tls_key:     ./etc/server.key


# =============================================================================
#  Limits + credits
# =============================================================================
creditcheck:     true           # Enforce user credit/ratio rules on downloads
free_space_mb:   2048           # Reject uploads when free space drops below this
max_connections: 300            # Global concurrent FTP session cap


# =============================================================================
#  show_diz — files whose contents are displayed on CWD as part of the 250- reply.
#  Map of filename → who_can_see ("*" = all users, or a flag like "1" for siteop).
#  The tvmaze / imdb plugins write .tvmaze / .imdb files automatically on MKD.
# =============================================================================
show_diz:
  .message: "*"
  .imdb:    "*"
  .tvmaze:  "*"
  .requests: "*"


# =============================================================================
#  Incomplete indicator — marker symlink shown in the section/dated dir for
#  incomplete releases. %0 is replaced with the release name. Leave empty to
#  disable the marker symlink. The progress bar inside the release is separate.
# =============================================================================
incomplete_indicator: "[incomplete]-%0"


# =============================================================================
#  NUKE
# =============================================================================
nuke_max_multiplier: 50         # Highest multiplier a siteop can nuke with
nukedir_style:       "[NUKED]-%N"   # Renamed dir pattern (%N = release name)


# =============================================================================
#  Plugins — extend the daemon with custom behavior. Each plugin receives
#  events (MKDIR, UPLOAD, DELETE, NUKE, etc.) and has access to the master
#  bridge for reading/writing files on slaves.
#
#  The built-in zipscript module is configured separately under `zipscript:`.
#  It handles SFV/race/COMPLETE-banner logic inside the daemon hot path.
#
#  Built-in plugins:
#    dateddirs - creates daily race dirs, !Today_<SECTION> symlinks,
#                read-only old date dirs, and NEWDAY events
#    tvmaze  — looks up TV shows on TVMaze when a release dir is created,
#              writes .tvmaze into the dir (shown via show_diz above)
#    imdb    — same for movies via imdbapi.dev, writes .imdb
#    mediainfo - runs mediainfo on uploaded audio/sample files and emits
#                AUDIOINFO / MEDIAINFO events for the sitebot
#    pre     - handles SITE PRE for affil staging dirs and PREBW announces
#    request - handles SITE REQUEST/REQUESTS/REQFILL/REQDEL/REQWIPE
#    speedtest - creates /SPEEDTEST/100MB, 500MB, 1000MB and
#                emits SPEEDTEST announces without applying credits
#
#  To add your own plugin:
#    1. Create /plugins/<name>/handler.go implementing plugin.Plugin
#    2. Add a case for it in cmd/goftpd/main.go's plugin switch
#    3. Add an entry below with `enabled: true` and any plugin-specific keys
#
#  Section matching is case-insensitive substring — "TV" matches TV-1080P,
#  TV-720P, TV-UHD, etc. Only plugins where enabled=true are loaded.
# =============================================================================
zipscript:
  enabled: true                # master-side zipscript module on/off
  debug: false                 # parsed now; reserved for zipscript-specific debug output

  race:
    enabled: true              # enables race tracking derived labels/stats
    max_users_in_top: 15       # parsed; not enforced yet
    max_groups_in_top: 0       # parsed; not enforced yet
    complete_banner: true      # show [SITE] - ( ... COMPLETE ... ) - [SITE]
    music_complete_genre: true # add genre/year on MP3/FLAC COMPLETE banner
    announce_norace: true      # parsed; not enforced yet

  sfv:
    force_first: false         # parsed; not enforced yet
    deny_double_sfv: true      # parsed; not enforced yet
    delete_bad_crc: true       # delete uploaded files that fail SFV CRC
    ignore_zero_size: true     # delete zero-byte uploads instead of keeping them
    allow_resume: false        # parsed; not enforced yet

  sections:
    sfv:
      - "/APPS/*"
      - "/BLURAY/*"
      - "/FLAC/*"
      - "/MP3/*"
      - "/TV-1080P/*"
      - "/FOREIGN/TV-NL/*"
    nocheck:
      - "/PRIVATE/*"
      - "/LINKS/*"
      - "/PRE/*"
      - "/REQUESTS/*"
    cleanup:
      - "/APPS/*"
      - "/BLURAY/*"
      - "/TV-1080P/*"

  incomplete:
    enabled: true                    # parsed; not enforced yet
    indicator: "../[incomplete]-%0"  # parsed; not enforced yet
    nfo_indicator: "../[no-nfo]-%0"  # parsed; not enforced yet
    cd_indicator: "../../[incomplete]-(%0)-%1" # parsed; not enforced yet
    mark_empty_dirs_on_rescan: true  # parsed; not enforced yet

  allowed_files:
    allowed_types: ["jpg", "jpeg", "cue", "m3u", "txt", "vob", "png", "m2ts", "ts", "log", "mkv"] # parsed; not enforced yet
    ignored_types: ["diz", "debug", "message", "imdb", "html", "url", "m3u", "metadata"] # parsed; not enforced yet

  audio:
    enabled: true               # parsed; not enforced yet
    cbr_check: false            # parsed; not enforced yet
    year_check: false           # parsed; not enforced yet
    banned_genre_check: true    # parsed; not enforced yet
    allowed_genre_check: false  # parsed; not enforced yet
    allowed_constant_bitrates: [192, 320] # parsed; not enforced yet
    allowed_years: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025] # parsed; not enforced yet
    banned_genres:
      - "Christian Rap"
      - "Christian Gangsta Rap"
      - "Contemporary Christian"
      - "Christian Rock"
    allowed_genres: []          # parsed; not enforced yet
    sort:
      genre: false              # parsed; old ZipScript-C used this for genre sort trees
      artist: false             # parsed; not enforced yet
      year: false               # parsed; not enforced yet
      group: false              # parsed; not enforced yet

plugins:
  dateddirs:
    enabled: true
    sections: ["EBOOKS", "MP3", "FLAC", "0DAY", "XXX-0DAY"]
    format: "0102"
    today_symlink: true
    symlink_prefix: "!Today_"
    readonly_after_minutes: 60
    debug: false
  tvmaze:
    enabled:  true
    sections: ["TV"]
    debug:    false
  imdb:
    enabled:  true
    sections: ["MOVIE", "X264", "X265", "BLURAY", "DVDR"]
    debug:    false
  mediainfo:
    enabled: true
    binary: "mediainfo"
    timeout_seconds: 20
    sections: ["FLAC", "MP3", "TV", "MOVIE", "X264", "X265", "BLURAY"]
    audio_extensions: ["flac", "mp3", "m4a", "wav"]
    video_extensions: ["mkv", "mp4", "avi", "m2ts"]
    sample_only: true
    debug: false
  speedtest:
    enabled: true
    dir: "/SPEEDTEST"
    files_mb: [100, 500, 1000]
    debug: false
  request:
    enabled: true
    # TUR-style request manager:
    #   SITE REQUEST Release.Name-GRP
    #   SITE REQUESTS
    #   SITE REQFILL <number|Release.Name-GRP>
    #   SITE REQDEL <number|Release.Name-GRP>
    #   SITE REQWIPE <number|Release.Name-GRP>
    # Enabling the plugin creates this base directory on startup.
    dir: "/REQUESTS"
    reqfile: "/REQUESTS/.requests"
    request_head: "REQ-"
    filled_head: "FILLED-"
    allow_space: false
    replace_with: "_"
    bad_chars: '*{^~/,+&\'
    max_requests: 30
    show_on_request: false
    show_on_fill: false
    do_not_create_dir_until_filled: false
    reqwipe_flags: "1"
    # FTP users allowed to submit hidden -by:<irc nick> ownership on behalf of
    # sitebot commands. Keep this to the dedicated sitebot/admin FTP account.
    proxy_users: ["goftpd"]
    debug: false
  pre:
    enabled: true
    # Shared affil file used by the daemon PRE plugin and the sitebot Affils plugin.
    affils_file: "etc/affils.yml"
    permissions_file: "etc/permissions.yml"
    group_file: "etc/group"
    acl_base_path: "/site"
    admin_flags: "1"
    base: "/PRE"
    bw_duration: 30
    bw_interval_ms: 500
    sections:
      - TV-1080P
      - TV-720P
      - MOVIE
      - X264
      - X265
      - BLURAY
      - MP3
      - FLAC
      - 0DAY
    dated_sections:
      - MP3
      - FLAC
      - 0DAY


# =============================================================================
#  Sitebot integration
#    - event_fifo:     Named pipe the daemon writes events to, sitebot reads from
#    - sitebot_config: Path to the sitebot's config.yml. SITE INVITE reads
#                      irc.channels + invite_channels from there (flag rules
#                      restricting which channels which users can be invited to).
# =============================================================================
event_fifo:     "/GoFTPd/etc/goftpd.sitebot.fifo"
sitebot_config: "/GoFTPd/sitebot/etc/config.yml"


# =============================================================================
#  Dupe detection — prevents re-uploading known releases.
# =============================================================================
xdupe_enabled: true
xdupe_db_path: "./logs/xdupe.db"


# =============================================================================
#  Debug — verbose logging for all subsystems.
#  When debug is true AND log_file is set, output is tee'd to both stderr
#  and the file. The file rotates daily — the active file is always
#  <log_file>, previous days are archived as <log_file>.YYYY-MM-DD.
#  log_keep_days controls how many archived copies to retain (default 1 =
#  today + yesterday). Set log_file: "" to disable file logging.
# =============================================================================
debug:          true
log_file:       "logs/goftpd.log"
log_keep_days:  1
