# =============================================================================
#  GoFTPd configuration — single file used for both master and slave roles.
#
#  The `mode:` setting decides which blocks are read. When `mode: master`,
#  the `slave:` block is ignored (and vice versa). You can keep this same
#  file on both boxes and just flip `mode:` + fill in the relevant block.
# =============================================================================


# =============================================================================
#  Server identity — cosmetic, shown in welcome banners and stats.
# =============================================================================
sitename_long:  "GoFTPd"        # Full site name, shown in FTP banners
sitename_short: "GoFTPd"            # 2-3 char site tag used in race stats
version:        "1.0.4b"        # Displayed in FEAT / LIST headers
timezone:       "Europe/Amsterdam" # IANA timezone for FTP LIST/MLSD/MDTM and dated dirs; empty/"Local" uses OS local time
show_cwd_banner: true           # Show the GoFTPd logo banner on CWD when there is no actual race data.
                                # Real race-stat banners are still shown regardless of this setting.


# =============================================================================
#  Listening + mode
# =============================================================================
mode:         master            # "master" or "slave" — controls which blocks below are active
listen_port:  21212             # FTP control-channel port (master only)
public_ip:    "1.2.3.4"         # IP advertised in PASV responses (master only)
pasv_min:     25000             # Passive data-port range lower bound (master only)
pasv_max:     30000             #   -"- upper bound
passthrough:  true              # true = client connects directly to slave (recommended)
                                # false = master proxies all data (2x bandwidth cost)


# =============================================================================
#  Master block — used when mode: master
#  Safe to leave filled on slave boxes; ignored there.
# =============================================================================
master:
  listen_host:       "0.0.0.0"  # Interface to bind slave-control socket
  control_port:      1099       # Port slaves connect to
  slave_allowlist: []           # Optional IP/CIDR allowlist for slave control connections.
                                # Leave empty to allow any source to attempt the slave handshake.
                                # Example: ["203.0.113.10", "2001:db8::10", "203.0.113.0/24"]
  heartbeat_timeout: 60         # Seconds before the master marks a silent slave offline.
                                # The master will try a ping at about half this interval.
  slave_auth_fail_limit: 2      # Built-in guard for bad slave-port handshakes.
                                # After this many failed pre-auth attempts from one IP
                                # within the fail window, the IP is temporarily banned.
  slave_auth_fail_window_seconds: 900
  slave_auth_ban_seconds: 3600


# =============================================================================
#  Slave block — used when mode: slave
#  On a master-only box, you can leave this with placeholder values.
# =============================================================================
slave:
  name:          ""             # Unique slave identifier — MUST match an entry in `slaves:` below
  master_host:   ""             # IP or hostname of the master
  master_port:   1099           # Must match master's control_port
  roots:         []             # List of root dirs this slave serves, e.g. ["/data/site"]
  pasv_port_min: 30000          # Passive-port range for client→slave data transfers
  pasv_port_max: 35000
  bind_ip:       ""             # Public IP advertised in PASV responses from this slave.
                                # If empty, slave auto-detects from the master connection.
                                # Set explicitly if the slave sits behind NAT.
  timeout:       60             # Slave-side inactivity timeout for master traffic.
                                # Keep this aligned with master.heartbeat_timeout.


# =============================================================================
#  Slave routing policies — master-only
#  Control which sections/paths each slave accepts, and load-balancing weights.
#
#    name:     Must match the slave's `slave.name`
#    sections: First path component(s) this slave accepts (case-insensitive)
#    paths:    Optional glob patterns, e.g. "/TV-*/*" or "/MOVIES/*"
#    weight:   Higher = more uploads routed here (default 1). Load balancer
#              picks the slave with the lowest (activeTransfers / weight) score,
#              tie-breaking on most free disk space.
#    readonly: true means scan/download only. The slave is never selected for
#              uploads, even if no other slave policy matches.
#
#  - A slave with no policy OR with empty sections+paths accepts everything.
#  - If every policy excludes an upload, the master falls back to writable
#    available slaves only. Read-only archive slaves stay excluded.
#  - For an archive server, point the slave root at the existing archive tree,
#    set readonly: true, then remerge/rescan so the master learns the files.
#    sections/paths are optional on readonly slaves; use them only as
#    documentation/status metadata unless you want to describe the archive scope.
# =============================================================================
# slaves:
#   - name: "SLAVE1"
#     sections: ["TV-1080P", "TV-720P"]
#     paths: ["/TV-*/*"]
#     weight: 2
#   - name: "SLAVE2"
#     sections: ["MP3", "FLAC"]
#     weight: 1
#   - name: "SLAVE3"
#     # no sections/paths = overflow/catch-all
#     weight: 1
#   - name: "ARCHIVE"
#     # Merged into the same virtual /TV-1080P, /X265, etc. paths for listing
#     # and downloads, but never used for uploads or new race dirs.
#     # sections are optional here; omit them if the archive root speaks for itself.
#     sections: ["TV-1080P", "TV-720P", "X265", "BLURAY"]
#     readonly: true
#     weight: 1


# =============================================================================
#  Section directories - master-only
#  These dirs are kept alive in the master's VFS and created automatically on
#  matching writable slaves when they connect or after SITE REHASH.
#
#  Nested dirs are supported, e.g. "/FOREIGN/TV-NL".
#  Read-only slaves are never modified.
# =============================================================================
sections:
  - "/0DAY"
  - "/APPS"
  - "/ARCHiVE"
  - "/BLURAY"
  - "/BLURAY-UHD"
  - "/DVDR"
  - "/EBOOKS"
  - "/FLAC"
  - "/FOREIGN"
  - "/FOREIGN/TV-CZ"
  - "/FOREIGN/TV-DE"
  - "/FOREIGN/TV-DK"
  - "/FOREIGN/TV-ES"
  - "/FOREIGN/TV-FI"
  - "/FOREIGN/TV-FR"
  - "/FOREIGN/TV-IT"
  - "/FOREIGN/TV-NL"
  - "/FOREIGN/TV-NO"
  - "/FOREIGN/TV-PL"
  - "/FOREIGN/TV-SE"
  - "/FOREIGN/TV-SK"
  - "/FOREIGN/X264-HD-FOREIGN"
  - "/FOREIGN/X264-SD-FOREIGN"
  - "/FOREIGN/X265-FOREIGN"
  - "/GAMES"
  - "/iNFO"
  - "/MBLURAY"
  - "/MDVDR"
  - "/MP3"
  - "/MVID"
  - "/NSW"
  - "/PRE"
  - "/PS5"
  - "/REQUESTS"
  - "/SPEEDTEST"
  - "/TV-1080P"
  - "/TV-2160P"
  - "/TV-720P"
  - "/TV-BLURAY"
  - "/TV-HDRIP"
  - "/TV-SD"
  - "/TV-SPORTS"
  - "/X264-HD-1080P"
  - "/X264-HD-720P"
  - "/X264-SD"
  - "/X265"
  - "/XXX-0DAY"
  - "/XXX-HD"
  - "/XXX-IMAGESETS"
  - "/XXX-SD"


# =============================================================================
#  Storage + paths
# =============================================================================
storage_path:   ./site          # Master: local fallback tree. Slave: default root if `roots:` empty.
acl_base_path:  "/"             # Match ACL rules against the visible virtual FTP tree.
passwd_file:    "etc/passwd"    # Password hash file (bcrypt / apr1)
msg_path:       "etc/msgs"      # Directory with welcome/rules/goodbye message templates


# =============================================================================
#  TLS — used on both master and slaves (same cert pair on all boxes).
# =============================================================================
tls_enabled: true
tls_cert:    ./etc/certs/server.crt
tls_key:     ./etc/certs/server.key


# =============================================================================
#  Limits + credits
# =============================================================================
creditcheck:     true           # Enforce user credit/ratio rules on downloads
free_space_mb:   2048           # Reject uploads when free space drops below this
max_connections: 300            # Global concurrent FTP session cap


# =============================================================================
#  show_diz — files whose contents are displayed on CWD as part of the 250- reply.
#  Map of filename → who_can_see ("*" = all users, or a flag like "1" for siteop).
#  The tvmaze / imdb plugins write .tvmaze / .imdb files automatically on MKD.
# =============================================================================
show_diz:
  .message: "*"
  .imdb:    "*"
  .tvmaze:  "*"
  .requests: "*"
  file_id.diz: "*"


# =============================================================================
#  NUKE
# =============================================================================
nuke_max_multiplier: 50         # Highest multiplier a siteop can nuke with
nukedir_style:       "[NUKED]-%N"   # Renamed dir pattern (%N = release name)


# =============================================================================
#  Plugins — extend the daemon with custom behavior. Each plugin receives
#  events (MKDIR, UPLOAD, DELETE, NUKE, etc.) and has access to the master
#  bridge for reading/writing files on slaves.
#
#  The built-in zipscript module is configured separately under `zipscript:`.
#  It handles SFV/race/COMPLETE-banner logic inside the daemon hot path.
#
#  Built-in plugins:
#    dateddirs - creates daily race dirs, !Today_<SECTION> symlinks,
#                read-only old date dirs, and NEWDAY events
#    tvmaze  — looks up TV shows on TVMaze when a release dir is created,
#              writes .tvmaze into the dir (shown via show_diz above)
#    imdb    — same for movies via imdbapi.dev, writes .imdb
#    mediainfo - runs mediainfo on uploaded audio/sample files and emits
#                AUDIOINFO / MEDIAINFO events for the sitebot
#    pre     - handles SITE PRE for affil staging dirs and PREBW announces
#    request - handles SITE REQUEST/REQUESTS/REQFILL/REQDEL/REQWIPE
#    speedtest - creates /SPEEDTEST/100MB, 500MB, 1000MB and
#                emits SPEEDTEST announces without applying credits
#
#  To add your own plugin:
#    1. Create /plugins/<name>/handler.go implementing plugin.Plugin
#    2. Add a case for it in cmd/goftpd/main.go's plugin switch
#    3. Add an entry below with `enabled: true` and a `config_file`
#
#  Section matching is case-insensitive substring — "TV" matches TV-1080P,
#  TV-720P, TV-UHD, etc. Only plugins where enabled=true are loaded.
#  The repo ships `config.yml.dist` files for plugin defaults; copy them to
#  `config.yml` so Git updates do not overwrite your local plugin settings.
# =============================================================================
zipscript:
  enabled: true                # master-side zipscript module on/off
  debug: false                 # reserved for zipscript-specific debug output

  race:
    enabled: true              # enables race tracking derived labels/stats
    max_users_in_top: 15       # limit HOF / SITE RACE user rows (0 = unlimited)
    max_groups_in_top: 0       # limit FTP group rows (0 = unlimited)
    complete_banner: true      # show [SITE] - ( ... COMPLETE ... ) - [SITE]
    music_complete_genre: true # add genre/year on MP3/FLAC COMPLETE banner
    announce_norace: true      # emit COMPLETE for first payload in non-SFV dirs too
    announce_subdirs: true     # announce helper release subdirs like Sample, Proof, and Subs; set false to suppress them entirely

  hooks:
    on_complete:
      enabled: false           # run an external command after a release completes
      run_on: "master"         # master or slave; slave runs on the owning slave where the files live
      slave_name: ""           # optional override when run_on=slave; normally leave empty to auto-pick the owning slave
      command: "/usr/bin/python3"
      args: ["/goftpd/bin/on_complete.py"]
      timeout_seconds: 30
      extra_env:
        EXAMPLE: "1"
      # Exported env vars include:
      #   GOFTPD_EVENT=COMPLETE
      #   GOFTPD_PATH / GOFTPD_DIR
      #   GOFTPD_HOOK_TARGET
      #   GOFTPD_SLAVE_NAME (when run_on=slave)
      #   GOFTPD_LOCAL_PATH (when run_on=slave; local filesystem path on that slave)
      #   GOFTPD_RELNAME
      #   GOFTPD_RELEASE_NAME
      #   GOFTPD_RELEASE_SUBDIR
      #   GOFTPD_SECTION
      #   GOFTPD_SECTION_ROOT
      #   GOFTPD_TOTAL_BYTES / GOFTPD_TOTAL_MB / GOFTPD_TOTAL_FILES
      #   GOFTPD_DURATION_MS / GOFTPD_DURATION
      #   GOFTPD_AVG_SPEED_MB
      #   GOFTPD_USER_COUNT
      # plus GOFTPD_<KEY> for zipscript race vars such as T_MBYTES/T_FILES/etc.

  sfv:
    force_first: false         # pzs-ng style: allow payload before .sfv; the release is checked once the .sfv lands
    deny_double_sfv: true      # reject a second .sfv in the same release dir
    delete_bad_crc: true       # delete uploaded files that fail SFV CRC
    ignore_zero_size: true     # delete zero-byte uploads instead of keeping them
    allow_resume: false        # allow REST resume for STOR / RETR when enabled

  sections:
    sfv:
      - "/0DAY/*/*"
      - "/APPS/*"
      - "/BLURAY/*"
      - "/BLURAY-UHD/*"
      - "/DVDR/*"
      - "/EBOOKS/*/*"
      - "/FLAC/*/*"
      - "/FOREIGN/TV-CZ/*"
      - "/FOREIGN/TV-DE/*"
      - "/FOREIGN/TV-DK/*"
      - "/FOREIGN/TV-ES/*"
      - "/FOREIGN/TV-FI/*"
      - "/FOREIGN/TV-FR/*"
      - "/FOREIGN/TV-IT/*"
      - "/FOREIGN/TV-NL/*"
      - "/FOREIGN/TV-NO/*"
      - "/FOREIGN/TV-PL/*"
      - "/FOREIGN/TV-SE/*"
      - "/FOREIGN/TV-SK/*"
      - "/FOREIGN/X264-HD-FOREIGN/*"
      - "/FOREIGN/X264-SD-FOREIGN/*"
      - "/FOREIGN/X265-FOREIGN/*"
      - "/GAMES/*"
      - "/MBLURAY/*"
      - "/MDVDR/*"
      - "/MVID/*"
      - "/MP3/*/*"
      - "/NSW/*"
      - "/PRE/*/*"
      - "/PS5/*"
      - "/REQUESTS/*/*"
      - "/TV-1080P/*"
      - "/TV-2160P/*"
      - "/TV-720P/*"
      - "/TV-BLURAY/*"
      - "/TV-HDRIP/*"
      - "/TV-SD/*"
      - "/TV-SPORTS/*"
      - "/X264-HD-1080P/*"
      - "/X264-HD-720P/*"
      - "/X264-SD/*"
      - "/X265/*"
      - "/XXX-0DAY/*/*"
      - "/XXX-HD/*"
      - "/XXX-IMAGESETS/*"
      - "/XXX-SD/*"
    zip:
      - "/0DAY/*/*"
      - "/EBOOKS/*/*"
      - "/XXX-IMAGESETS/*"
    nocheck:
      - "/PRIVATE/*"
      - "/LINKS/*"
      - "/PRE/*"
      - "/REQUESTS/*"
    ignored_release_subdirs: ["Sample", "Proof", "Subs", "Subtitles", "Covers"] # helper dirs inside a release that should not get NEW/RACE/COMPLETE or marker handling
    # release_check controls where the stricter "this should end up as a proper
    # complete release" behavior applies:
    #   - incomplete markers
    #   - missing-NFO markers
    #   - other release-completeness checks
    #
    # If left empty, it falls back to the sfv list above.
    # Older configs may still use `cleanup:`; that alias is still accepted.
    release_check:
      - "/0DAY/*/*"
      - "/APPS/*"
      - "/BLURAY/*"
      - "/BLURAY-UHD/*"
      - "/DVDR/*"
      - "/EBOOKS/*/*"
      - "/FLAC/*/*"
      - "/FOREIGN/TV-CZ/*"
      - "/FOREIGN/TV-DE/*"
      - "/FOREIGN/TV-DK/*"
      - "/FOREIGN/TV-ES/*"
      - "/FOREIGN/TV-FI/*"
      - "/FOREIGN/TV-FR/*"
      - "/FOREIGN/TV-IT/*"
      - "/FOREIGN/TV-NL/*"
      - "/FOREIGN/TV-NO/*"
      - "/FOREIGN/TV-PL/*"
      - "/FOREIGN/TV-SE/*"
      - "/FOREIGN/TV-SK/*"
      - "/FOREIGN/X264-HD-FOREIGN/*"
      - "/FOREIGN/X264-SD-FOREIGN/*"
      - "/FOREIGN/X265-FOREIGN/*"
      - "/GAMES/*"
      - "/MBLURAY/*"
      - "/MDVDR/*"
      - "/MVID/*"
      - "/MP3/*/*"
      - "/NSW/*"
      - "/PRE/*/*"
      - "/PS5/*"
      - "/REQUESTS/*/*"
      - "/TV-1080P/*"
      - "/TV-2160P/*"
      - "/TV-720P/*"
      - "/TV-BLURAY/*"
      - "/TV-HDRIP/*"
      - "/TV-SD/*"
      - "/TV-SPORTS/*"
      - "/X264-HD-1080P/*"
      - "/X264-HD-720P/*"
      - "/X264-SD/*"
      - "/X265/*"
      - "/XXX-0DAY/*/*"
      - "/XXX-HD/*"
      - "/XXX-IMAGESETS/*"
      - "/XXX-SD/*"

  incomplete:
    enabled: true                    # enable virtual incomplete / missing-file markers in section listings
    indicator: "[incomplete]-%0"     # shown for releases with missing SFV payload files
    no_sfv_indicator: "[no-sfv]-%0"  # shown when a release dir has files but no .sfv yet
    nfo_indicator: "[no-nfo]-%0"     # shown when a release_check release has no .nfo
    cd_indicator: "[incomplete]-(%0)-%1" # shown for incomplete CD1 / DISC2 style child dirs
    mark_empty_dirs_on_rescan: true  # empty rescanned release dirs also get incomplete markers

  allowed_files:
    allowed_types: ["jpg", "jpeg", "cue", "m3u", "txt", "vob", "png", "m2ts", "ts", "log", "mkv"] # extra extensions allowed in SFV dirs
    ignored_types: ["diz", "debug", "message", "imdb", "html", "url", "m3u", "metadata"] # ignored by force-first / type checks

  audio:
    enabled: true               # enforce audio policy on MP3 / FLAC uploads
    cbr_check: false            # require CBR and match allowed_constant_bitrates
    year_check: false           # require year to be in allowed_years
    banned_genre_check: true    # delete uploads with banned genres
    allowed_genre_check: false  # if true, only genres in allowed_genres pass
    allowed_constant_bitrates: [192, 320] # checked when cbr_check is enabled
    allowed_years: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025] # checked when year_check is enabled
    banned_genres:
      - "Christian Rap"
      - "Christian Gangsta Rap"
      - "Contemporary Christian"
      - "Christian Rock"
    allowed_genres: []          # used when allowed_genre_check is true
    genre_path: "/music.by.genre"   # sort-tree root for genre links
    artist_path: "/music.by.artist" # sort-tree root for artist links
    year_path: "/music.by.year"     # sort-tree root for year links
    group_path: "/music.by.group"   # sort-tree root for release group links
    sort:
      genre: false              # create <genre_path>/<Genre>/<Release> symlinks
      artist: false             # create <artist_path>/<Artist>/<Release> symlinks
      year: false               # create <year_path>/<Year>/<Release> symlinks
      group: false              # create <group_path>/<Group>/<Release> symlinks

plugins:
  autonuke:
    enabled: false
    config_file: "plugins/autonuke/config.yml"
  dateddirs:
    enabled: true
    config_file: "plugins/dateddirs/config.yml"
  tvmaze:
    enabled: true
    config_file: "plugins/tvmaze/config.yml"
  imdb:
    enabled: true
    config_file: "plugins/imdb/config.yml"
  mediainfo:
    enabled: true
    config_file: "plugins/mediainfo/config.yml"
  speedtest:
    enabled: true
    config_file: "plugins/speedtest/config.yml"
  request:
    enabled: true
    # TUR-style request manager:
    #   SITE REQUEST Release.Name-GRP
    #   SITE REQUESTS
    #   SITE REQFILL <number|Release.Name-GRP>
    #   SITE REQDEL <number|Release.Name-GRP>
    #   SITE REQWIPE <number|Release.Name-GRP>
    # Enabling the plugin creates this base directory on startup.
    config_file: "plugins/request/config.yml"
  releaseguard:
    enabled: false
    config_file: "plugins/releaseguard/config.yml"
  pre:
    enabled: true
    # Shared affil file used by the daemon PRE plugin and the sitebot Affils plugin.
    config_file: "plugins/pre/config.yml"


# =============================================================================
#  Sitebot integration
#    - event_fifo:     Named pipe the daemon writes events to, sitebot reads from
#    - sitebot_config: Path to the sitebot's config.yml. SITE INVITE reads
#                      irc.channels + invite_channels from there (flag rules
#                      restricting which channels which users can be invited to).
# =============================================================================
event_fifo:     "/GoFTPd/etc/goftpd.sitebot.fifo"
sitebot_config: "/GoFTPd/sitebot/etc/config.yml"


# =============================================================================
#  Dupe detection — prevents re-uploading known releases.
# =============================================================================
xdupe_enabled: true
xdupe_db_path: "./logs/xdupe.db"


# =============================================================================
#  Debug — verbose logging for all subsystems.
#  When debug is true AND log_file is set, output goes to the rotating log
#  file. Set log_console: true to mirror that same output to the console.
#  The active file is always <log_file>; previous days are archived as
#  <log_file>.YYYY-MM-DD. log_delete_after_days removes rotated log files
#  older than that many days. log_keep_days is kept as an older alias.
#  Set log_file: "" to disable file logging.
# =============================================================================
debug:          false
log_file:       "logs/goftpd.log"
log_delete_after_days: 1
log_keep_days:  1
log_console:    true

